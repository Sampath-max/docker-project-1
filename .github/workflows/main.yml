name: pushing the docker images
on:
  workflow_dispatch:
    branches: [ "master" ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: cloning the repository
        uses: actions/checkout@v4
      - name: setup and login into docker registry 
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0
        with:
          username: ${{ vars.USER_NAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: BUILDING THE IMAGES
        run: docker build -t ${{ vars.DOCKER_IMAGE }} .
      - name: tag the image 
        run: docker tag ${{ vars.DOCKER_IMAGE }} ${{ vars.USER.NAME }}/${{ vars.DOCKER.IMAGE }}:v1
      - name: pushing the images to docker registry
        run: docker push ${{ vars.USER_NAME }}/${{ vars.DOCKER_IMAGE }}:v1
